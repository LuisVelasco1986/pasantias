{% extends "pages/dashboard.html" %}

{% block dashboard_content %}
<div class="mb-4">
    <h2 class="sectionTitle">{% if object %}Editar{% else %}Nuevo{% endif %} Departamento</h2>
</div>

<div class="" style="max-width: 800px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-success">Guardar Cambios</button>
                <a href="{% url 'modelNewApp:departamentos_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
