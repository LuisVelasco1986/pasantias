{% extends "pages/dashboard.html" %}
{% load static %}

{% block dashboard_content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="text-center p-5 shadow-sm border rounded bg-white" style="max-width: 500px;">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#198754" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        
        <h2 class="sectionTitle mb-3">¡Contraseña actualizada!</h2>
        <p class="text-muted mb-4">
            Tu contraseña se ha cambiado correctamente. A partir de ahora deberás usar tu nueva clave para iniciar sesión.
        </p>
        
        <div class="d-grid">
            <a href="{% url 'modelNewApp:perfil' %}" class="btn btn-primary">
                Volver a mi perfil
            </a>
        </div>
    </div>
</div>
{% endblock dashboard_content %}
